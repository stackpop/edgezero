name: Deploy actions

on:
  pull_request:
    paths:
      - .github/actions/build-cli/**
      - .github/actions/deploy-core/**
      - .github/actions/deploy-fastly/**
      - .github/actions/healthcheck-fastly/**
      - .github/actions/rollback-fastly/**
      - .github/workflows/deploy-action.yml
      - crates/edgezero-adapter/**
      - crates/edgezero-adapter-fastly/**
      - crates/edgezero-cli/**
      - docs/guide/deploy-github-actions.md
      - docs/specs/**
  push:
    branches: [main]
    paths:
      - .github/actions/build-cli/**
      - .github/actions/deploy-core/**
      - .github/actions/deploy-fastly/**
      - .github/actions/healthcheck-fastly/**
      - .github/actions/rollback-fastly/**
      - .github/workflows/deploy-action.yml
      - crates/edgezero-adapter/**
      - crates/edgezero-adapter-fastly/**
      - crates/edgezero-cli/**
      - docs/guide/deploy-github-actions.md
      - docs/specs/**

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: 1.7.7
  ZIZMOR_VERSION: 1.16.3

jobs:
  static-checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install actionlint (pinned release binary)
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error "$url" --output /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Actionlint (this workflow)
        run: actionlint .github/workflows/deploy-action.yml

      - name: Third-party actions pinned to a ref
        run: .github/actions/deploy-core/tests/check-action-pins.sh

      - name: Install zizmor (cargo, no pip)
        run: cargo install zizmor --version "${ZIZMOR_VERSION}" --locked

      - name: Zizmor security scan
        run: |
          zizmor --offline \
            .github/workflows/deploy-action.yml \
            .github/actions/build-cli/action.yml \
            .github/actions/deploy-fastly/action.yml \
            .github/actions/healthcheck-fastly/action.yml \
            .github/actions/rollback-fastly/action.yml

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck action scripts
        run: |
          shellcheck -x \
            .github/actions/build-cli/scripts/*.sh \
            .github/actions/deploy-core/scripts/*.sh \
            .github/actions/deploy-core/tests/*.sh \
            .github/actions/deploy-fastly/scripts/*.sh

      - name: Bash contract tests
        run: .github/actions/deploy-core/tests/run.sh

      - name: Validate docs
        run: |
          cd docs
          npm ci
          npm run format
          npm run lint
          npm run build

  composite-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build CLI from the monorepo package
        id: cli
        uses: ./.github/actions/build-cli
        with:
          cli-package: edgezero-cli
          cli-bin: edgezero
          working-directory: .

      - name: Create fixture app
        run: .github/actions/deploy-core/tests/make-smoke-fixture.sh

      - name: Deploy fixture (production) with local action
        uses: ./.github/actions/deploy-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          working-directory: fixture-app
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service
          deploy-args: '["--comment","smoke"]'

      - name: Assert the deploy reached the Fastly CLI
        run: |
          set -euo pipefail
          test -f fixture-app/fastly-argv.txt
          # The action orchestrated build-cli -> deploy-fastly -> app CLI ->
          # `fastly compute deploy`; the fake `fastly` recorded a compute subcommand.
          grep -q -- 'compute' fixture-app/fastly-argv.txt
          echo "recorded fastly argv:"; cat fixture-app/fastly-argv.txt
