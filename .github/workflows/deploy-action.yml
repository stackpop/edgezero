name: Deploy actions

on:
  pull_request:
    paths:
      - .github/actions/build-cli/**
      - .github/actions/deploy-core/**
      - .github/actions/deploy-fastly/**
      - .github/actions/healthcheck-fastly/**
      - .github/actions/rollback-fastly/**
      - .github/workflows/deploy-action.yml
      - crates/edgezero-adapter/**
      - crates/edgezero-adapter-fastly/**
      - crates/edgezero-cli/**
      - docs/guide/deploy-github-actions.md
      - docs/specs/**
  push:
    branches: [main]
    paths:
      - .github/actions/build-cli/**
      - .github/actions/deploy-core/**
      - .github/actions/deploy-fastly/**
      - .github/actions/healthcheck-fastly/**
      - .github/actions/rollback-fastly/**
      - .github/workflows/deploy-action.yml
      - crates/edgezero-adapter/**
      - crates/edgezero-adapter-fastly/**
      - crates/edgezero-cli/**
      - docs/guide/deploy-github-actions.md
      - docs/specs/**

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: 1.7.7
  ZIZMOR_VERSION: 1.16.3

jobs:
  static-checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install actionlint (pinned release binary, checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error "$base/$archive" --output "/tmp/$archive"
          # Verify against the checksums file published with the same release.
          curl --fail --location --silent --show-error \
            "$base/actionlint_${ACTIONLINT_VERSION}_checksums.txt" --output /tmp/actionlint_checksums.txt
          ( cd /tmp && grep -- " ${archive}\$" actionlint_checksums.txt | sha256sum --check --strict - )
          tar -xzf "/tmp/$archive" -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Actionlint (this workflow)
        run: actionlint .github/workflows/deploy-action.yml

      - name: Third-party actions pinned to a ref
        run: .github/actions/deploy-core/tests/check-action-pins.sh

      - name: Install zizmor (cargo, no pip)
        run: cargo install zizmor --version "${ZIZMOR_VERSION}" --locked

      - name: Zizmor security scan
        run: |
          zizmor --offline \
            .github/workflows/deploy-action.yml \
            .github/actions/build-cli/action.yml \
            .github/actions/deploy-fastly/action.yml \
            .github/actions/healthcheck-fastly/action.yml \
            .github/actions/rollback-fastly/action.yml

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck action scripts
        # -e SC1091: the `source "$SCRIPT_DIR/common.sh"` path is dynamic, so
        # shellcheck can't follow it from the repo root — that info finding is
        # not a real defect. Everything else is checked.
        run: |
          shellcheck -e SC1091 \
            .github/actions/build-cli/scripts/*.sh \
            .github/actions/deploy-core/scripts/*.sh \
            .github/actions/deploy-core/tests/*.sh \
            .github/actions/deploy-fastly/scripts/*.sh

      - name: Bash contract tests
        run: .github/actions/deploy-core/tests/run.sh

      - name: Validate docs
        run: |
          cd docs
          npm ci
          npm run format
          npm run lint
          npm run build

  composite-smoke:
    runs-on: ubuntu-24.04
    # An inherited provider alias the deploy MUST clear (provider-env boundary).
    env:
      FASTLY_ENDPOINT: https://inherited.invalid
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # The fixture is a REAL app-owned CLI (its own crate depending on
      # edgezero-cli) — the contract build-cli actually promises.
      - name: Create fixture app (app-owned CLI)
        run: .github/actions/deploy-core/tests/make-smoke-fixture.sh

      - name: Build the APP's own CLI package
        id: cli
        uses: ./.github/actions/build-cli
        with:
          cli-package: fixture-app-cli
          working-directory: fixture-app

      - name: Deploy fixture (production) with local action
        id: deploy
        uses: ./.github/actions/deploy-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          working-directory: fixture-app
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service
          deploy-args: '["--comment","smoke"]'
          cache: true

      - name: Assert production deploy, version threading, and credential boundary
        env:
          FASTLY_VERSION_OUT: ${{ steps.deploy.outputs['fastly-version'] }}
        run: |
          set -euo pipefail
          # 1) The whole chain ran: build-cli -> deploy-fastly -> app CLI -> the
          #    overridden Fastly deploy command.
          test -f fixture-app/deploy-argv.txt
          test -f fixture-app/env-seen.txt
          echo "recorded argv:"; cat fixture-app/deploy-argv.txt
          echo "credentials the deploy saw:"; cat fixture-app/env-seen.txt
          # 2) fastly-version threaded out of the action.
          [[ "$FASTLY_VERSION_OUT" == "7" ]] || { echo "::error::expected fastly-version=7, got '$FASTLY_VERSION_OUT'"; exit 1; }
          # 3) provider-env boundary: typed creds present, inherited alias cleared.
          grep -qx 'token=dummy-token' fixture-app/env-seen.txt || { echo "::error::typed FASTLY_API_TOKEN not delivered"; exit 1; }
          grep -qx 'service-id=dummy-service' fixture-app/env-seen.txt || { echo "::error::typed FASTLY_SERVICE_ID not delivered"; exit 1; }
          grep -qx 'endpoint=CLEARED' fixture-app/env-seen.txt || { echo "::error::inherited FASTLY_ENDPOINT was NOT cleared before deploy"; exit 1; }

  # Exercises the FULL Fastly staging lifecycle (stage -> healthcheck ->
  # rollback) against faithful fake `fastly`/`curl` binaries, asserting the exact
  # verbs and paths. This is the regression test for the review findings:
  # --comment must not reach `compute update`; the domain API returns a singular
  # `staging_ip`; activate/deactivate are PUT; staging deactivate is
  # /deactivate/staging; and an unhealthy probe must FAIL the healthcheck action.
  lifecycle-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create fixture app (app-owned CLI)
        run: .github/actions/deploy-core/tests/make-smoke-fixture.sh

      - name: Build the APP's own CLI package
        id: cli
        uses: ./.github/actions/build-cli
        with:
          cli-package: fixture-app-cli
          working-directory: fixture-app

      - name: Install fake fastly + curl
        run: .github/actions/deploy-core/tests/make-fake-fastly-env.sh

      - name: Download the app CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.cli.outputs.artifact-name }}
          path: cli-dl

      - name: Extract the app CLI
        env:
          CLI_BIN: ${{ steps.cli.outputs.cli-bin }}
        run: |
          set -euo pipefail
          mkdir -p cli-bin
          tar -xf cli-dl/*.tar -C cli-bin
          chmod +x "cli-bin/$CLI_BIN"

      - name: Staged deploy (asserts --comment never reaches `compute update`)
        env:
          CLI_BIN: ${{ steps.cli.outputs.cli-bin }}
          FASTLY_API_TOKEN: dummy-token
          FASTLY_SERVICE_ID: dummy-service
        run: |
          set -euo pipefail
          cd fixture-app
          out=$("$GITHUB_WORKSPACE/cli-bin/$CLI_BIN" \
            deploy --adapter fastly --service-id dummy-service --stage -- --comment "staged smoke" 2>&1 | tee /dev/stderr)
          echo "$out" | grep -qE '^version=42$' || { echo "::error::staged deploy did not emit version=42"; exit 1; }

      - name: Assert the staged Fastly call sequence
        run: |
          set -euo pipefail
          log="$FAKE_CALL_LOG"
          echo "--- recorded fastly/curl calls:"; cat "$log"

          update=$(grep -E '^fastly compute update ' "$log" | head -n 1)
          [[ -n "$update" ]] || { echo "::error::no 'compute update' call"; exit 1; }
          # `compute update` does NOT support --comment; it must never be forwarded.
          if grep -qE '^fastly compute update .*--comment' "$log"; then
            echo "::error::--comment was forwarded to 'compute update' (unsupported flag)"; exit 1
          fi
          for flag in -- --autoclone --version=active --non-interactive; do
            [[ "$update" == *"$flag"* ]] || { echo "::error::'compute update' missing $flag"; exit 1; }
          done

          # The comment must be applied to the version, BEFORE staging it.
          grep -qE '^fastly service-version update .*--comment' "$log" \
            || { echo "::error::comment was not applied via 'service-version update'"; exit 1; }
          cu=$(grep -n '^fastly service-version update ' "$log" | head -n 1 | cut -d: -f1)
          st=$(grep -n '^fastly service-version stage ' "$log" | head -n 1 | cut -d: -f1)
          [[ -n "$st" ]] || { echo "::error::version was never staged"; exit 1; }
          [[ "$cu" -lt "$st" ]] || { echo "::error::comment applied after staging (must precede it)"; exit 1; }

      - name: Health check the staged version (singular staging_ip)
        uses: ./.github/actions/healthcheck-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          deploy-to: staging
          domain: staging.example.com
          fastly-version: "42"
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service
          retry: "1"
          retry-delay: "1"

      - name: Assert staging IP was resolved and probed
        run: |
          set -euo pipefail
          log="$FAKE_CALL_LOG"
          grep -qE '^GET https://api\.fastly\.com/service/dummy-service/version/42/domain\?include=staging_ips$' "$log" \
            || { echo "::error::staging-IP lookup not performed"; exit 1; }
          # The probe must be rerouted to the staging IP from the singular field.
          grep -qE '^PROBE .*--connect-to ::151\.101\.2\.10:443 .*https://staging\.example\.com/' "$log" \
            || { echo "::error::probe was not rerouted to the staging IP"; exit 1; }

      - name: Health check FAILS closed when unhealthy
        id: unhealthy
        continue-on-error: true
        uses: ./.github/actions/healthcheck-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          deploy-to: staging
          domain: staging.example.com
          fastly-version: "42"
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service
          retry: "1"
          retry-delay: "1"
        env:
          # Flip the fake probe to 503 for this step only.
          FORCE_UNHEALTHY: "1"

      - name: Assert the unhealthy check actually failed the wrapper
        env:
          OUTCOME: ${{ steps.unhealthy.outcome }}
          HEALTHY: ${{ steps.unhealthy.outputs.healthy }}
        run: |
          set -euo pipefail
          # The rollback gate is "healthcheck step failed". If an unhealthy probe
          # lets the action succeed, no caller would ever roll back.
          [[ "$OUTCOME" == "failure" ]] \
            || { echo "::error::unhealthy probe did not fail healthcheck-fastly (outcome=$OUTCOME)"; exit 1; }
          [[ "$HEALTHY" != "true" ]] \
            || { echo "::error::unhealthy probe still reported healthy=true"; exit 1; }
          echo "healthcheck-fastly failed closed on an unhealthy probe"

      - name: Rollback the staged version (PUT /deactivate/staging)
        uses: ./.github/actions/rollback-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          deploy-to: staging
          fastly-version: "42"
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service

      - name: Rollback production (PUT /activate on v-1)
        id: prod-rollback
        uses: ./.github/actions/rollback-fastly
        with:
          cli-artifact: ${{ steps.cli.outputs.artifact-name }}
          deploy-to: production
          fastly-version: "42"
          fastly-api-token: dummy-token
          fastly-service-id: dummy-service

      - name: Assert rollback verbs, paths, and version threading
        env:
          ROLLED_BACK_TO: ${{ steps.prod-rollback.outputs['rolled-back-to'] }}
        run: |
          set -euo pipefail
          log="$FAKE_CALL_LOG"
          echo "--- recorded calls:"; cat "$log"
          # Staging rollback: PUT .../deactivate/staging (NOT a plain /deactivate).
          grep -qE '^PUT https://api\.fastly\.com/service/dummy-service/version/42/deactivate/staging$' "$log" \
            || { echo "::error::staging rollback did not PUT /deactivate/staging"; exit 1; }
          # Production rollback activates the PREVIOUS version (42 -> 41), via PUT.
          grep -qE '^PUT https://api\.fastly\.com/service/dummy-service/version/41/activate$' "$log" \
            || { echo "::error::production rollback did not PUT /version/41/activate"; exit 1; }
          # Version threading out of the action.
          [[ "$ROLLED_BACK_TO" == "41" ]] || { echo "::error::expected rolled-back-to=41, got '$ROLLED_BACK_TO'"; exit 1; }
