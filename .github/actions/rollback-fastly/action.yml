name: EdgeZero rollback-fastly
description: Roll back a Fastly deployment via the app CLI. Production activates the previous version; staging deactivates the staged version.

inputs:
  app-cli-artifact:
    description: Name of the build-app-cli artifact to download and run.
    required: true
  app-cli-bin:
    description: Binary name inside the artifact. Defaults to the artifact metadata.
    required: false
    default: ""
  fastly-api-token:
    description: Fastly API token.
    required: true
  fastly-service-id:
    description: Fastly service ID.
    required: true
  fastly-version:
    description: The current (bad) Fastly version to roll back from.
    required: true
  deploy-to:
    description: Deployment target, 'production' or 'staging'.
    required: false
    default: production

outputs:
  rolled-back-to:
    description: The Fastly version that was activated (production only).
    value: ${{ steps.rollback.outputs['rolled-back-to'] }}

runs:
  using: composite
  steps:
    # GitHub does not enforce `required: true` on composite inputs, and an empty
    # artifact name makes actions/download-artifact fetch EVERY artifact in the
    # run — so the CLI we execute would be arbitrary. Check before downloading.
    - name: Validate inputs
      shell: bash
      env:
        EDGEZERO__APP__CLI__ARTIFACT_PRESENT: ${{ inputs['app-cli-artifact'] != '' && 'true' || 'false' }}
      run: $GITHUB_ACTION_PATH/scripts/validate.sh

    - name: Download CLI artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs['app-cli-artifact'] }}
        path: ${{ runner.temp }}/edgezero-cli-download
      env:
        FASTLY_API_TOKEN: ""
        FASTLY_SERVICE_ID: ""
        FASTLY_TOKEN: ""
        FASTLY_KEY: ""
        FASTLY_API_KEY: ""
        FASTLY_AUTH_TOKEN: ""
        FASTLY_API_ENDPOINT: ""
        FASTLY_ENDPOINT: ""
        FASTLY_API_URL: ""
        FASTLY_PROFILE: ""
        FASTLY_SERVICE_NAME: ""
        FASTLY_DEBUG: ""
        FASTLY_DEBUG_MODE: ""
        FASTLY_CONFIG_FILE: ""
        FASTLY_CARGO_PROFILE: ""
        FASTLY_HOME: ""

    - name: Extract CLI
      id: cli
      shell: bash
      env:
        EDGEZERO__APP__CLI__ARTIFACT_DIR: ${{ runner.temp }}/edgezero-cli-download
        EDGEZERO__ACTION__TOOL_ROOT: ${{ runner.temp }}/edgezero-action-tools
        EDGEZERO__APP__CLI__BIN: ${{ inputs['app-cli-bin'] }}
        FASTLY_API_TOKEN: ""
        FASTLY_TOKEN: ""
        FASTLY_KEY: ""
        FASTLY_API_KEY: ""
        FASTLY_AUTH_TOKEN: ""
        FASTLY_ENDPOINT: ""
        FASTLY_API_ENDPOINT: ""
        FASTLY_API_URL: ""
        FASTLY_PROFILE: ""
        FASTLY_SERVICE_ID: ""
        FASTLY_SERVICE_NAME: ""
        FASTLY_DEBUG: ""
        FASTLY_DEBUG_MODE: ""
        FASTLY_CONFIG_FILE: ""
        FASTLY_CARGO_PROFILE: ""
        FASTLY_HOME: ""
      run: $GITHUB_ACTION_PATH/../deploy-core/scripts/download-app-cli.sh

    - name: Rollback
      id: rollback
      shell: bash
      env:
        EDGEZERO__APP__CLI__BIN: ${{ steps.cli.outputs['app-cli-bin'] }}
        EDGEZERO__APP__CLI__PATH: ${{ steps.cli.outputs['app-cli-path'] }}
        EDGEZERO__LIFECYCLE__SERVICE_ID: ${{ inputs['fastly-service-id'] }}
        EDGEZERO__LIFECYCLE__VERSION: ${{ inputs['fastly-version'] }}
        EDGEZERO__DEPLOY__TO: ${{ inputs['deploy-to'] }}
        # Only the typed token reaches the CLI; blank any inherited alias.
        FASTLY_API_TOKEN: ${{ inputs['fastly-api-token'] }}
        FASTLY_TOKEN: ""
        FASTLY_KEY: ""
        FASTLY_API_KEY: ""
        FASTLY_AUTH_TOKEN: ""
        FASTLY_ENDPOINT: ""
        FASTLY_API_ENDPOINT: ""
        FASTLY_API_URL: ""
        FASTLY_PROFILE: ""
        FASTLY_SERVICE_ID: ""
        FASTLY_SERVICE_NAME: ""
        FASTLY_DEBUG: ""
        FASTLY_DEBUG_MODE: ""
        FASTLY_CONFIG_FILE: ""
        FASTLY_CARGO_PROFILE: ""
        FASTLY_HOME: ""
      run: $GITHUB_ACTION_PATH/scripts/rollback.sh

    - name: Cleanup
      if: ${{ always() }}
      shell: bash
      env:
        EDGEZERO__ACTION__TOOL_ROOT: ${{ runner.temp }}/edgezero-action-tools
        FASTLY_API_TOKEN: ""
        FASTLY_SERVICE_ID: ""
        FASTLY_TOKEN: ""
        FASTLY_KEY: ""
        FASTLY_API_KEY: ""
        FASTLY_AUTH_TOKEN: ""
        FASTLY_API_ENDPOINT: ""
        FASTLY_ENDPOINT: ""
        FASTLY_API_URL: ""
        FASTLY_PROFILE: ""
        FASTLY_SERVICE_NAME: ""
        FASTLY_DEBUG: ""
        FASTLY_DEBUG_MODE: ""
        FASTLY_CONFIG_FILE: ""
        FASTLY_CARGO_PROFILE: ""
        FASTLY_HOME: ""
      run: $GITHUB_ACTION_PATH/../deploy-core/scripts/cleanup.sh
