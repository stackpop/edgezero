[workspace]
members = [
    "crates/edgezero-adapter-axum",
    "crates/edgezero-adapter-cloudflare",
    "crates/edgezero-adapter-fastly",
    "crates/edgezero-adapter-spin",
    "crates/edgezero-adapter",
    "crates/edgezero-cli",
    "crates/edgezero-core",
    "crates/edgezero-macros",
]
exclude = ["examples/app-demo"]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["EdgeZero Team <dev@edgezero.dev>"]
license = "Apache-2.0"

[workspace.dependencies]
anyhow = "1"
async-compression = { version = "0.4", features = [
    "futures-io",
    "gzip",
    "brotli",
] }
async-stream = "0.3"
async-trait = "0.1"
axum = { version = "0.8", default-features = true }
brotli = "8"
bytes = "1"
chrono = "0.4"
ctor = "0.10"
edgezero-adapter = { path = "crates/edgezero-adapter" }
edgezero-adapter-axum = { path = "crates/edgezero-adapter-axum", default-features = false }
edgezero-adapter-cloudflare = { path = "crates/edgezero-adapter-cloudflare", default-features = false }
edgezero-adapter-fastly = { path = "crates/edgezero-adapter-fastly", default-features = false }
edgezero-adapter-spin = { path = "crates/edgezero-adapter-spin", default-features = false }
edgezero-core = { path = "crates/edgezero-core", default-features = false }
fastly = "0.12"
fern = "0.7"
flate2 = { version = "1", features = ["rust_backend"] }
futures = { version = "0.3", features = ["std", "executor"] }
futures-util = { version = "0.3", features = ["alloc", "io"] }
handlebars = "6"
http = "1"
http-body = "1"
log = "0.4"
log-fastly = "0.12"
matchit = "0.9"
once_cell = "1"
redb = "4.0"
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_urlencoded = "0.7"
simple_logger = "5"
spin-sdk = { version = "5.2", default-features = false }
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
toml = { version = "1.1" }
tower = { version = "0.5", features = ["util"] }
tower-layer = "0.3"
tower-service = "0.3"
tracing = "0.1"
validator = { version = "0.20", features = ["derive"] }
walkdir = { version = "2" }
web-time = "1"
worker = { version = "0.8", features = ["http"] }

[workspace.lints.clippy]
# Enable Pedantic lints for style.
pedantic = { level = "warn", priority = -1 }
# Enable the restriction group (the most severe/strict group).
restriction = { level = "deny", priority = -1 }

# ---------------------------------------------------------------------------
# Allow-list for currently-failing lints under pedantic + restriction.
#
# These were captured as a baseline when the strict groups were first turned
# on. Every entry is a TODO: pick one, remove the allow, fix the call sites,
# re-enable. Keep the counts up to date so progress is visible. Lints marked
# (intentional) are ones we likely do not want to enforce; the rest should
# be factored out over time.
#
# Refresh counts with:
#   cargo clippy --workspace --all-targets --all-features --message-format=json \
#     | jq -r 'select(.reason=="compiler-message") | .message.code.code' \
#     | sort | uniq -c | sort -rn
# Note: clippy stops emitting after a per-file threshold, so iterate by
# silencing the noisiest, re-running, and adding the next wave.
# ---------------------------------------------------------------------------

# -- Meta -------------------------------------------------------------------
# Enabling the whole `restriction` group is what `blanket_clippy_restriction_lints`
# warns against. We do it deliberately as a discovery mechanism — allow it.
blanket_clippy_restriction_lints = "allow"   # 6  (intentional: we opt in to the group wholesale)

# -- Documentation (factor out by writing docs) -----------------------------
missing_docs_in_private_items = "allow"      # 275: private items lack doc comments
missing_panics_doc = "allow"                 # 10:  pub fn that may panic missing # Panics section
missing_inline_in_public_items = "allow"     # 9:   pub items without #[inline] (intentional? revisit)
doc_markdown = "allow"                       # 4:   bare identifiers in doc comments need backticks
missing_errors_doc = "allow"                 # 4:   pub fn returning Result missing # Errors section
missing_fields_in_debug = "allow"            # 4:   manual `Debug` impl skipping fields

# -- Style / formatting (factor out by reformatting) ------------------------
implicit_return = "allow"                    # 375: trailing-expression returns vs explicit `return` (intentional: idiomatic Rust)
arbitrary_source_item_ordering = "allow"     # 165: ordering of items within a module (cosmetic)
module_name_repetitions = "allow"            # 78:  `foo::FooConfig` style names that repeat the module
min_ident_chars = "allow"                    # 54:  single/two-letter identifiers (e.g., `e`, `id`, `kv`)
single_call_fn = "allow"                     # 37:  helper fns called from exactly one site (often intentional for clarity)
unseparated_literal_suffix = "allow"         # 24:  `1u32` vs `1_u32`
str_to_string = "allow"                      # 18:  `&str::to_string()` vs `String::from`/`.into()`
shadow_reuse = "allow"                       # 15:  `let x = x.foo();` reusing a binding name
uninlined_format_args = "allow"              # 13:  `format!("{}", x)` vs `format!("{x}")`
single_char_lifetime_names = "allow"         # 6:   lifetimes like `'a` (intentional: idiomatic Rust)
if_then_some_else_none = "allow"             # 6:   `if c { Some(x) } else { None }` vs `c.then(|| x)`
match_wildcard_for_single_variants = "allow" # 5:   `_ => ...` matching a single remaining variant
deref_by_slicing = "allow"                   # 5:   `&v[..]` vs `&*v`
shadow_unrelated = "allow"                   # 5:   `let x = ...; let x = unrelated;`
redundant_closure_for_method_calls = "allow" # 5:   `.map(|x| x.foo())` vs `.map(Foo::foo)`
similar_names = "allow"                      # 4:   variables whose names differ only slightly
unreadable_literal = "allow"                 # 4:   large numeric literals without `_` separators
shadow_same = "allow"                        # 4:   `let x = x;` rebinding to the same value
explicit_iter_loop = "allow"                 # 3:   `for x in xs.iter()` vs `for x in &xs`
pub_with_shorthand = "allow"                 # 3:   `pub(super)` shorthand vs `pub(in super)`
string_add = "allow"                         # 3:   `s + "..."` operator vs `format!`/`push_str`
pathbuf_init_then_push = "allow"             # 3:   `PathBuf::new()` then `.push(...)` vs `PathBuf::from(...)`
map_unwrap_or = "allow"                      # 3:   `.map(...).unwrap_or(...)` vs `.map_or(...)`
pub_use = "allow"                            # 2:   `pub use` re-exports (intentional in our public API surface)
semicolon_outside_block = "allow"            # 2:   `{ ... };` placement
semicolon_if_nothing_returned = "allow"      # 2:   `expr` vs `expr;` at end of a `()` block
non_ascii_literal = "allow"                  # 2:   non-ASCII characters in string literals
elidable_lifetime_names = "allow"            # 2:   named lifetime that could use `'_`
implicit_clone = "allow"                     # 2:   `x.to_owned()` where `.clone()` would do
ip_constant = "allow"                        # 2:   hand-rolled `Ipv4Addr::new(127,0,0,1)` vs `Ipv4Addr::LOCALHOST`
manual_let_else = "allow"                    # 2:   `match` / `if let` rewrite as `let ... else`
too_many_lines = "allow"                     # 2:   fn body exceeding the (configurable) line threshold
return_and_then = "allow"                    # 2:   `return x.and_then(...)` vs `x?` or `Ok(...)?`
else_if_without_else = "allow"               # 2:   `if/else if` chain missing a final `else`
manual_string_new = "allow"                  # 1:   `String::from("")` vs `String::new()`
redundant_type_annotations = "allow"         # 1:   type annotation that the compiler can infer
decimal_literal_representation = "allow"     # 1:   `1024` rendered better as `0x400`
needless_raw_strings = "allow"               # 1:   `r"..."` with no escapes that needs raw-ness
needless_raw_string_hashes = "allow"         # 1:   `r#"..."#` whose hashes are unnecessary
format_push_string = "allow"                 # 1:   `s.push_str(&format!(...))` vs `write!`
redundant_test_prefix = "allow"              # 1:   `fn test_foo()` inside a module already named `tests`

# -- Defensive coding -------------------------------------------------------
# Test code is exempted via `clippy.toml` (allow-{unwrap,expect,panic,
# indexing-slicing}-in-tests = true), so the counts below reflect *production*
# code only. `unwrap_used` is denied; `assertions_on_result_states` is denied
# (use `.unwrap()`/`.unwrap_err()` instead — they print the value on failure).
# Each remaining allow has been audited per-site at least once; the rationale
# below describes the *category of site* the lint fires on, not just "noise".
question_mark_used = "allow"                 # (intentional: `?` is core Rust idiom — the whole language design assumes it)
pattern_type_mismatch = "allow"              # (intentional: every flagged site uses Rust 2018 match-ergonomics — `match &x { Variant(y) => ... }` where `y` is auto-`&T`. The "fix" is to manually write `match x { Variant(ref y) => ... }` or `match &x { &Variant(ref y) => ... }`, both *worse* than current code.)
default_numeric_fallback = "allow"           # (intentional: requiring `0_u32`/`1.0_f64` on every literal in HTTP routing/parsing code is noise without bug-prevention value)
arithmetic_side_effects = "allow"            # (audited: every flagged site is bounded by domain invariants — `SystemTime::now() + ttl`, path-component counts, byte offsets after `len()` checks. None can realistically overflow on inputs we accept.)
float_arithmetic = "allow"                   # (intentional: same rationale as `arithmetic_side_effects` — we don't do float-heavy work)
as_conversions = "allow"                     # (audited: dominated by trait-object coercions like `Arc::new(x) as BoxMiddleware` which *cannot* be expressed as `From`/`Into` in stable Rust. The numeric `as` casts are all `usize → u64` widenings on 64-bit; safe.)
string_slice = "allow"                       # (audited: every flagged site indexes into ASCII-only data — env var names, header names, path components from `matchit`. Revisit if any future code accepts Unicode in those positions.)
expect_used = "allow"                        # (audited 62 production sites: bundled-template registration, AsyncRead-contract slice access, lock-poisoning unrecoverable, build-script panics. None benefit from `?` propagation — see PR description for category breakdown.)
unwrap_in_result = "allow"                   # (overlaps with `expect_used` since the lint fires on `.expect()` too inside `Result`-returning fns)
panic = "allow"                              # (audited: route-registration `unwrap_or_else(|err| panic!("duplicate route: {err}"))` and proc-macro expansion failures — both are build/setup-time programmer errors, not runtime conditions)
cast_possible_truncation = "allow"           # (audited: narrowing casts always follow a range check)
cast_sign_loss = "allow"                     # (audited: signed→unsigned casts always follow a `>= 0` check)
let_underscore_must_use = "allow"            # (audited: dev-server graceful-shutdown paths where the spawn-task result is genuinely uninteresting)

# -- API design ------------------------------------------------------------
# Real fixes applied: `impl_trait_in_params` (26), `return_self_not_must_use`
# (18), `rc_buffer` (4), `unnecessary_wraps` (4), `mutex_atomic` (1),
# `same_name_method` (2), `renamed_function_params` (4),
# `wildcard_enum_match_arm` (7), `clone_on_ref_ptr` (1), `ref_patterns` (11).
# `#[non_exhaustive]` applied to all 4 error enums (`EdgeError`, `KvError`,
# `SecretError`, `ConfigStoreError`), the 19 deserialize-only manifest
# structs, and the manifest enums (`HttpMethod`, `BodyMode`, `LogLevel`).
# The lints below stay allowed with audited rationales:
exhaustive_structs = "allow"                 # (audited 108 sites: applied #[non_exhaustive] selectively to internal manifest types. Remaining flagged sites are tuple-struct extractors users *destructure* (`Json<T>(pub T)` etc.), unit structs, externally-constructed scaffold blueprints, and request-context types used in integration tests — all of which would break if marked.)
exhaustive_enums = "allow"                   # (audited 18 sites: applied to all 4 error enums + manifest enums. Remaining are `Body` (2 variants, unlikely to grow — would force 12+ adapter sites to add never-firing wildcards) and `AdapterAction` (3 variants, same.))
must_use_candidate = "allow"                 # (audited: 117 sites are getters returning `&str`/`&Path`/`&Foo` where ignoring the value is impossible by construction. Adding `#[must_use]` to all of them is documentation noise without preventing a real bug class.)
missing_trait_methods = "allow"              # (audited: relying on default trait methods is fine; the lint wants every default method spelled out which is pure noise.)
needless_pass_by_value = "allow"             # (audited: real fix applied to `run_app_with_stores` (FastlyLogging, StoreRequirements). Remaining 14 sites are deliberate ownership transfers — error converters that `match err {...}` and consume, proc-macro `attr: TokenStream` upstream signatures, builders that store the value, top-level CLI entry.)
field_scoped_visibility_modifiers = "allow"  # (intentional: `pub(crate)` / `pub(super)` on fields are deliberate visibility choices, not noise.)
partial_pub_fields = "allow"                 # (intentional: same — selective field exposure is by design.)
trivially_copy_pass_by_ref = "allow"         # (intentional: API ergonomics; pass-by-ref is fine for `Method` / `StatusCode` etc.)

# -- Imports / paths (factor out by adjusting use-statements) ---------------
absolute_paths = "allow"                     # 19:  `::std::...` style paths
unused_trait_names = "allow"                 # 6:   imported trait whose name isn't referenced
non_std_lazy_statics = "allow"               # 6:   `once_cell::Lazy` instead of `std::sync::LazyLock` (Rust 1.80+)
std_instead_of_alloc = "allow"               # 6:   `std::vec::Vec` etc. in no_std-compatible code
iter_over_hash_type = "allow"                # 2:   iterating a `HashMap`/`HashSet` in non-deterministic order
std_instead_of_core = "allow"                # 1:   `std::*` usage where `core::*` works

# -- Output / diagnostics (factor out by routing through `log`/`tracing`) ---
print_stderr = "allow"                       # 16:  `eprintln!`/`eprint!` (kept in CLI / build script for now)
print_stdout = "allow"                       # 8:   `println!`/`print!` (kept in CLI / examples for now)
unnecessary_debug_formatting = "allow"       # 2:   `{:?}` for types that have `Display`

# -- Tests ------------------------------------------------------------------
tests_outside_test_module = "allow"          # 1:   `#[test]` fn outside a `#[cfg(test)] mod tests`

# -- Attributes -------------------------------------------------------------
allow_attributes_without_reason = "allow"    # 5:   `#[allow(...)]` without `, reason = "..."`
allow_attributes = "allow"                   # 3:   `#[allow]` instead of `#[expect]` on stable

[workspace.lints.rust]
# Disallow unsafe code by default. Individual items may opt in with
# `#[allow(unsafe_code)]` plus a SAFETY comment when FFI/mmap
# boundaries require it (e.g., llama.cpp Send/Sync, safetensors mmap).
unsafe_code = "deny"
# `#[expect(...)]` attrs the linter sweep added become "unfulfilled"
# when the workspace later allow-lists the corresponding lint. Allow
# the meta-lint until we either prune those attrs or switch the
# workspace policy back to per-site allows.
unfulfilled_lint_expectations = "allow"