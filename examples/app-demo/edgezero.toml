# This manifest describes the shared EdgeZero application and its adapter-specific configurations.

[app]
name = "app-demo"
middleware = ["edgezero_core::middleware::RequestLogger"]
version = "0.1.0"
kind = "http"
entry = "crates/app-demo-core"

[[triggers.http]]
id = "root"
path = "/"
methods = ["GET"]
handler = "app_demo_core::handlers::root"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Default health-check endpoint"

[[triggers.http]]
id = "echo"
path = "/echo/{name}"
methods = ["GET"]
handler = "app_demo_core::handlers::echo"
adapters = ["axum", "cloudflare", "fastly", "spin"]

[[triggers.http]]
id = "stream"
path = "/stream"
methods = ["GET"]
handler = "app_demo_core::handlers::stream"
adapters = ["axum", "cloudflare", "fastly", "spin"]
body-mode = "stream"

[[triggers.http]]
id = "headers"
path = "/headers"
methods = ["GET"]
handler = "app_demo_core::handlers::headers"
adapters = ["axum", "cloudflare", "fastly", "spin"]

[[triggers.http]]
id = "echo_json"
path = "/echo"
methods = ["POST"]
handler = "app_demo_core::handlers::echo_json"
adapters = ["axum", "cloudflare", "fastly", "spin"]


[[triggers.http]]
id = "proxy_demo"
path = "/proxy/{*rest}"
methods = ["GET", "POST"]
handler = "app_demo_core::handlers::proxy_demo"
adapters = ["axum", "cloudflare", "fastly", "spin"]

[[triggers.http]]
id = "config_get"
path = "/config/{name}"
methods = ["GET"]
handler = "app_demo_core::handlers::config_get"
adapters = ["axum", "cloudflare", "fastly", "spin"]

[[triggers.http]]
id = "config_typed"
path = "/config/typed"
methods = ["GET"]
handler = "app_demo_core::handlers::config_typed"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Return the greeting from the typed blob config (blob-model demo)"

# -- KV demo routes --------------------------------------------------------

[[triggers.http]]
id = "kv_counter"
path = "/kv/counter"
methods = ["POST"]
handler = "app_demo_core::handlers::kv_counter"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Increment and return a visit counter stored in KV"

[[triggers.http]]
id = "kv_note_put"
path = "/kv/notes/{id}"
methods = ["POST"]
handler = "app_demo_core::handlers::kv_note_put"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Store a note by id"

[[triggers.http]]
id = "kv_note_get"
path = "/kv/notes/{id}"
methods = ["GET"]
handler = "app_demo_core::handlers::kv_note_get"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Read a note by id"

[[triggers.http]]
id = "kv_note_delete"
path = "/kv/notes/{id}"
methods = ["DELETE"]
handler = "app_demo_core::handlers::kv_note_delete"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Delete a note by id"

# -- Introspection routes ------------------------------------------------------

[[triggers.http]]
id = "manifest"
path = "/_app-demo/manifest"
methods = ["GET"]
handler = "edgezero_core::introspection::manifest"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "App manifest as JSON"

[[triggers.http]]
id = "config"
path = "/_app-demo/config"
methods = ["GET"]
handler = "edgezero_core::introspection::config"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Effective app config (secret-safe)"

[[triggers.http]]
id = "routes"
path = "/_app-demo/routes"
methods = ["GET"]
handler = "edgezero_core::introspection::routes"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Registered route table"

# -- Secrets demo route --------------------------------------------------------

[[triggers.http]]
id = "secrets_echo"
path = "/secrets/echo"
methods = ["GET"]
handler = "app_demo_core::handlers::secrets_echo"
adapters = ["axum", "cloudflare", "fastly", "spin"]
description = "Echo an allowlisted smoke-test secret value (smoke-test only — do not use in production)"

# -- Stores ----------------------------------------------------------------
#
# `[stores.<kind>]` declares logical store ids only — the portable fact that
# this app uses a store. Platform names are resolved at runtime; a store's
# name defaults to its logical id.

[stores.kv]
ids = ["sessions", "cache"]
default = "sessions"

[stores.config]
ids = ["app_config"]
default = "app_config"

[stores.secrets]
ids = ["default"]
default = "default"

# [environment]
#
# [[environment.variables]]
# name = "API_BASE_URL"
# description = "Base URL for upstream API calls"
# env = "API_BASE_URL"
# value = "https://example.com/api"
