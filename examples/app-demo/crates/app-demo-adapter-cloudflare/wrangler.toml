name = "app-demo-adapter-cloudflare"
main = "build/worker/shim.mjs"
compatibility_date = "2023-05-01"

[build]
command = "worker-build --release"

# Config store as a single JSON string var, keyed by the binding name from edgezero.toml.
# CloudflareConfigStore parses this at startup into a HashMap, enabling arbitrary key names.
[vars]
app_config = '{"greeting":"hello from config store","feature.new_checkout":"false","service.timeout_ms":"1500"}'

# KV namespace binding — used by KV demo handlers.
# For local dev (`wrangler dev`), this creates a local KV store automatically.
# For production, replace `id` with the output of:
#   wrangler kv:namespace create EDGEZERO_KV
[[kv_namespaces]]
binding = "EDGEZERO_KV"
id = "local-dev-placeholder"
