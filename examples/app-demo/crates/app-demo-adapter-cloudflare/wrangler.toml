name = "app-demo-adapter-cloudflare"
main = "build/worker/shim.mjs"
compatibility_date = "2023-05-01"

[build]
command = "worker-build --release"

# KV namespace bindings, one per logical store id from `edgezero.toml`.
# `wrangler dev` auto-provisions local KV namespaces for each binding;
# `id` values are placeholders for production — replace with the output of
# `wrangler kv namespace create <BINDING>` per environment.
#
# Each binding name matches the logical id by default; override with
# `EDGEZERO__STORES__<KIND>__<ID>__NAME=<binding>` at runtime if you need
# to remap a namespace per environment.

# `[stores.kv].ids = ["sessions", "cache"]`
[[kv_namespaces]]
binding = "sessions"
id = "local-dev-placeholder"

[[kv_namespaces]]
binding = "cache"
id = "local-dev-placeholder"

# `[stores.config].ids = ["app_config"]` — config is KV-backed on Cloudflare
#. Seed values via `wrangler kv key put` against this namespace;
# the pre-rewrite `[vars] app_config = '{ … }'` form is gone.
[[kv_namespaces]]
binding = "app_config"
id = "local-dev-placeholder"
