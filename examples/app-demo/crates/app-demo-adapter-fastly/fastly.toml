authors = [""]
description = ""
language = "rust"
manifest_version = 3
name = "app-demo-adapter-fastly"
service_id = ""

[local_server]

# Config store entries for local Viceroy testing.
# Mirrors [stores.config.defaults] in edgezero.toml so smoke tests pass on all adapters.
[local_server.config_stores.app_config]
format = "inline-toml"

[local_server.config_stores.app_config.contents]
greeting = "hello from config store"
"feature.new_checkout" = "false"
"service.timeout_ms" = "1500"

[local_server.kv_stores]

[[local_server.kv_stores.EDGEZERO_KV]]
# We use a dummy key to initialize the store.
# 'data' provides inline content (empty string here).
# 'path' would load content from a file (e.g. path="./README.md"), but we don't need that.
key = "__init__"
data = ""

[setup]
[setup.kv_stores]
[setup.kv_stores.EDGEZERO_KV]
description = "KV store for EdgeZero demo"

[scripts]
build = "cargo build --profile release --target wasm32-wasip1"
