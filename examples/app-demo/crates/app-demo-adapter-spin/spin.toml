spin_manifest_version = 2

[application]
name = "app-demo-adapter-spin"
version = "0.1.0"

# Application-level variable declarations.
#
# As of the Spin KV-config migration, app-config keys live in the
# KV-backed `app_config` store (see `[component.app-demo].key_value_stores`
# below) — `[variables]` here is now SECRETS-ONLY.
#
# `api_token` is the `#[secret]` field from `AppDemoConfig`; its value
# resolves through Spin's flat variable namespace, so it must be declared
# with `secret = true` for the wasm component to read it. `vault` is
# `#[secret(store_ref)]` — the value is a runtime store id, not material
# to keep secret, but bound the same way for consistency with the
# `AppDemoConfig` surface. `smoke_secret` keeps an empty default so the
# server starts without a value set; pass
# `SPIN_VARIABLE_SMOKE_SECRET=<value>` when running smoke_test_secrets.sh.
[variables]
api_token = { required = true, secret = true }
vault = { default = "default" }
smoke_secret = { default = "" }

# Component name is shortened for brevity; scaffolded projects use the full
# adapter crate name (e.g. "{{proj_spin}}") via the template.
[[trigger.http]]
route = "/..."
component = "app-demo"

[component.app-demo]
source = "../../target/wasm32-wasip2/release/app_demo_adapter_spin.wasm"
allowed_outbound_hosts = ["https://*:*"]
# Each label is the platform name of a `[stores.kv]` / `[stores.config]`
# id from `edgezero.toml`. `app_config` is the KV-backed config store the
# adapter opens on demand; `sessions` and `cache` are the KV labels.
# Override per-id via `EDGEZERO__STORES__<KIND>__<ID>__NAME=<label>` if
# you need to remap.
key_value_stores = ["app_config", "sessions", "cache"]

[component.app-demo.variables]
api_token = "{{ api_token }}"
vault = "{{ vault }}"
smoke_secret = "{{ smoke_secret }}"

[component.app-demo.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
