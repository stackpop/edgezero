# Spin runtime configuration for app-demo — declares the KV
# labels the component is allowed to open at runtime. Each
# label uses the default SQLite-backed Spin KV backend, which
# persists to `.spin/sqlite_key_value.db` next to this file.
#
# Custom labels (anything other than `default`) require a
# declaration here; without one, `spin up` errors with
# "unknown key_value_stores label <name>". `app_config` is the
# KV-backed config store; `sessions` and `cache` are the KV
# labels app-demo declares in `edgezero.toml`. Add a stanza
# below for every additional `[stores.kv]` / `[stores.config]`
# id you wire up.

[key_value_store.app_config]
type = "spin"

[key_value_store.sessions]
type = "spin"

[key_value_store.cache]
type = "spin"
